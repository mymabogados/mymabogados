<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gracias — Millán & Martínez Abogados</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0e0e0e;--ink2:#3a3a3a;--muted:#888;--rule:#ddd9d2;--cream:#f7f4ef;--gold:#b8975a;--white:#fefefe}
body{background:var(--white);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
nav{display:flex;justify-content:space-between;align-items:center;padding:1.5rem 5rem;border-bottom:1px solid var(--rule);background:var(--white)}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;letter-spacing:0.06em;color:var(--ink);line-height:1.1}
.logo small{display:block;font-family:'DM Sans',sans-serif;font-size:0.52rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);font-weight:300;margin-top:3px}
.logo em{font-style:italic;color:var(--gold)}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:6rem 5rem}
.content{max-width:36rem;text-align:center}
.check{width:56px;height:56px;border:1px solid var(--rule);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 2.5rem}
.check::after{content:'';display:block;width:20px;height:11px;border-left:1.5px solid var(--ink);border-bottom:1.5px solid var(--ink);transform:rotate(-45deg) translate(2px,-2px)}
h1{font-family:'Cormorant Garamond',serif;font-size:2.75rem;font-weight:300;line-height:1.1;margin-bottom:1.25rem}
h1 em{font-style:italic;color:var(--gold)}
p{font-size:0.92rem;color:var(--ink2);line-height:1.85;margin-bottom:2.5rem}
a.btn{display:inline-flex;align-items:center;gap:0.8rem;padding:0.9rem 2.2rem;background:var(--ink);color:var(--white);font-family:'DM Sans',sans-serif;font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;text-decoration:none;transition:background 0.2s}
a.btn:hover{background:var(--ink2)}
footer{padding:2rem 5rem;border-top:1px solid var(--rule);display:flex;justify-content:space-between;align-items:center;background:var(--cream)}
.footer-logo{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;letter-spacing:0.06em}
.footer-logo em{font-style:normal;color:var(--gold)}
.footer-copy{font-size:0.68rem;color:var(--muted);letter-spacing:0.08em}
@media(max-width:900px){nav{padding:1.25rem 2rem}main{padding:4rem 2rem}footer{padding:2rem;flex-direction:column;gap:1rem;text-align:center}}
</style>
</head>
<body>

<nav>
  <div class="logo">Millán <em>&</em> Martínez<small>Abogados</small></div>
</nav>

<main>
  <div class="content">
    <div class="check"></div>
    <h1>Recibimos tu <em>mensaje</em></h1>
    <p>Gracias por contactarnos. Uno de nuestros socios se pondrá en contacto contigo en las próximas horas para agendar tu llamada de 30 minutos sin costo.</p>
    <a href="/" class="btn">Volver al inicio →</a>
  </div>
</main>

<footer>
  <div class="footer-logo">Millán <em>&</em> Martínez <span style="font-weight:300;color:var(--muted)">Abogados</span></div>
  <div class="footer-copy">© 2026 Millán & Martínez</div>
</footer>

</body>
</html>
